<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="space" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f3d"/>
      <stop offset="45%" stop-color="#0a0618"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="nebulaPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6d28d9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#be185d" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#be185d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#0e7490" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="40%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="textglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#space)"/>

  <!-- nebula clouds -->
  <ellipse cx="280" cy="140" rx="260" ry="160" fill="url(#nebulaPurple)" filter="url(#blur)"/>
  <ellipse cx="920" cy="260" rx="300" ry="180" fill="url(#nebulaPink)" filter="url(#blur)"/>
  <ellipse cx="650" cy="340" rx="240" ry="140" fill="url(#nebulaBlue)" filter="url(#blur)"/>

  <!-- distant star field (tiny static) -->
  <g fill="#ffffff">
    <circle cx="40" cy="60" r="0.7" opacity="0.5"/>
    <circle cx="95" cy="310" r="0.6" opacity="0.4"/>
    <circle cx="160" cy="25" r="0.8" opacity="0.6"/>
    <circle cx="220" cy="380" r="0.5" opacity="0.3"/>
    <circle cx="310" cy="200" r="0.7" opacity="0.5"/>
    <circle cx="400" cy="40" r="0.6" opacity="0.4"/>
    <circle cx="470" cy="360" r="0.7" opacity="0.5"/>
    <circle cx="545" cy="90" r="0.5" opacity="0.35"/>
    <circle cx="615" cy="310" r="0.8" opacity="0.6"/>
    <circle cx="700" cy="20" r="0.6" opacity="0.45"/>
    <circle cx="780" cy="160" r="0.7" opacity="0.5"/>
    <circle cx="860" cy="380" r="0.5" opacity="0.35"/>
    <circle cx="940" cy="80" r="0.8" opacity="0.55"/>
    <circle cx="1030" cy="230" r="0.6" opacity="0.4"/>
    <circle cx="1100" cy="50" r="0.7" opacity="0.5"/>
    <circle cx="1160" cy="300" r="0.6" opacity="0.4"/>
    <circle cx="75" cy="180" r="0.5" opacity="0.3"/>
    <circle cx="250" cy="100" r="0.6" opacity="0.45"/>
    <circle cx="370" cy="280" r="0.7" opacity="0.5"/>
    <circle cx="520" cy="220" r="0.5" opacity="0.35"/>
    <circle cx="820" cy="240" r="0.6" opacity="0.4"/>
    <circle cx="1000" cy="370" r="0.7" opacity="0.5"/>
  </g>

  <!-- twinkling stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="80" r="1.6">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="260" r="1.2">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="120" r="1.8">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="430" cy="220" r="1.3">
      <animate attributeName="opacity" values="0.3;0.95;0.3" dur="2.8s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="50" r="1.5">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="590" cy="180" r="1.1">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="670" cy="70" r="1.7">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="3.8s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="290" r="1.3">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="110" r="1.5">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="330" r="1.2">
      <animate attributeName="opacity" values="0.3;0.95;0.3" dur="2.8s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="150" r="1.6">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1060" cy="280" r="1.3">
      <animate attributeName="opacity" values="0.3;0.95;0.3" dur="2.4s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1130" cy="120" r="1.5">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="220" r="1.2">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.6s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="350" r="1.4">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="3s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- big glowing stars -->
  <g>
    <circle cx="150" cy="300" r="14" fill="url(#glow)"/>
    <circle cx="150" cy="300" r="1.8" fill="#ffffff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="70" r="12" fill="url(#glow)"/>
    <circle cx="1050" cy="70" r="1.6" fill="#ffffff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- distant planet -->
  <g>
    <circle cx="980" cy="310" r="52" fill="url(#planet)"/>
    <ellipse cx="980" cy="310" rx="78" ry="10" fill="none" stroke="#a78bfa" stroke-width="1.2" stroke-opacity="0.55"/>
    <ellipse cx="980" cy="310" rx="86" ry="12" fill="none" stroke="#ec4899" stroke-width="0.8" stroke-opacity="0.35"/>
  </g>

  <!-- shooting star -->
  <g>
    <line x1="-120" y1="-40" x2="0" y2="0" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="1.6s" begin="2s;10s;18s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" from="100,40" to="900,340" dur="1.6s" begin="2s;10s;18s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- title -->
  <g filter="url(#textglow)">
    <text x="600" y="195" text-anchor="middle" font-family="Georgia,serif" font-size="86" font-weight="700" fill="#ffffff" letter-spacing="18">HUGO</text>
  </g>
  <text x="600" y="230" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#c4b5fd" letter-spacing="8" font-style="italic">SOFTWARE ENGINEER · PRODUCT BUILDER · NOVADEV</text>

  <!-- subtle bottom line -->
  <line x1="440" y1="260" x2="760" y2="260" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="600" y="283" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" fill="#a78bfa" letter-spacing="3" opacity="0.85">shipping small universes from the void</text>
</svg>
